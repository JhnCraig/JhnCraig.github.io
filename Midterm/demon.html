    <script>
        async function loadCharacters() {
            try {
                const response = await fetch("https://www.demonslayer-api.com/api/v1/characters?limit=45&page=1");
                const characters = (await response.json()).content;

                const findCharacter = search => {
                    const query = search.trim().toLowerCase();
                    const exactMatch = characters.find(c => c.name && c.name.trim().toLowerCase() === query);
                    return exactMatch || characters.find(c => c.name && c.name.toLowerCase().includes(query));
                };

                const nezuko = findCharacter("nezuko");
                const hand = findCharacter("hand");

                const swamp = findCharacter("swamp");
                const muzan = findCharacter("muzan");
                const Tamayo = findCharacter("Tamayo");

                const yushiro = findCharacter("yushiro");
                const susamaru = findCharacter("susamaru");

                const yahaba = findCharacter("yahaba");
                const kyogai = findCharacter("kyogai");
                const Son = findCharacter("Son");

                const Daughter = findCharacter("Daughter");
                const Mother = findCharacter("Mother");

                const Father = findCharacter("Father");

                const rui = findCharacter("rui");
                const enmu = findCharacter("enmu");
                const akaza = findCharacter("akaza");

                const Daki = findCharacter("Daki");
                const gyutaro = findCharacter("gyutaro");
                const doma = findCharacter("doma");

                const hantengu = findCharacter("hantengu");

                const gyokko = findCharacter("gyokko");

                const nakime = findCharacter("nakime");

                const kokushibo = findCharacter("kokushibo");

                function render(id, character) {
                    const el = document.getElementById(id);
                    if (!el) return; // prevents crash if div missing

                    if (!character) {
                        el.innerHTML = "<p>Character not found</p>";
                        return;
                    }

                    el.innerHTML = `
                <div style="display:flex; gap:20px; align-items:flex-start;">
                    <div>
                        <img src="${character.img}" width="180" style="border-radius:10px;">
                    </div>

                    <div>
                        <h3>${character.name}</h3>
                        <p><strong>Age:</strong> ${character.age || "N/A"}</p>
                        <p><strong>Gender:</strong> ${character.gender || "N/A"}</p>
                        <p><strong>Race:</strong> ${character.race || "N/A"}</p>
                        <p><strong>Description:</strong> ${character.description || "No description"}</p>
                        <p><strong>Quote:</strong> <em>"${character.quote || 'No quote'}"</em></p>

                    </div>
                </div>
            `;
                }

                render("nezuko", nezuko);
                render("hand", hand);
                render("swamp", swamp);
                render("muzan", muzan);
                render("Tamayo", Tamayo);
                render("yushiro", yushiro);
                render("susamaru", susamaru);
                render("yahaba", yahaba);
                render("kyogai", kyogai);
                render("Son", Son);
                render("Daughter", Daughter);
                render("Mother", Mother);
                render("Father", Father);
                render("rui", rui);
                render("enmu", enmu);
                render("akaza", akaza);
                render("Daki", Daki);
                render("gyutaro", gyutaro);
                render("doma", doma);
                render("hantengu", hantengu);
                render("gyokko", gyokko);
                render("nakime", nakime);
                render("kokushibo", kokushibo);

            } catch (err) {
                console.error("ERROR:", err);
            }
        }

        loadCharacters();
    </script>
