<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <style>
        .bg-maroon {

        .bg-maroon .nav-link,

        html,

            overflow-x: hidden;
            max-width: 100%;

            <div class="row justify-content-center text-center g-4">

                    <img src="..." alt="...">

                <div class="card" style="width: 18rem;">
                    <img src="..." alt="...">

                    <img src="..." alt="...">

            <div class="row justify-content-center mt-5 text-center g-4">

                    <img src="..." alt="...">

                    <img src="..." alt="...">

                    </div>

        <h2 class="text-white mt-5 mb-4 fs-4">

    <div class="container-fluid bg-maroon p-0 pt-4 pb-2 text-center">
        <p class="text-white ">© 2026 Demon Slayer Fan Website. All rights reserved.</p>
