    <script>
        async function loadCharacters() {
            try {
                const resPage1 = await fetch("https://www.demonslayer-api.com/api/v1/characters?limit=3&page=1");
                const page1 = (await resPage1.json()).content;

                const resPage2 = await fetch("https://www.demonslayer-api.com/api/v1/characters?limit=3&page=2");
                const page2 = (await resPage2.json()).content;

                const resPage3 = await fetch("https://www.demonslayer-api.com/api/v1/characters?limit=3&page=3");
                const page3 = (await resPage3.json()).content;

                const resPage4 = await fetch("https://www.demonslayer-api.com/api/v1/characters?limit=3&page=4");
                const page4 = (await resPage4.json()).content;

                const resPage7 = await fetch("https://www.demonslayer-api.com/api/v1/characters?limit=3&page=7");
                const page7 = (await resPage7.json()).content;

                const resPage9 = await fetch("https://www.demonslayer-api.com/api/v1/characters?limit=3&page=9");
                const page9 = (await resPage9.json()).content;

                const resPage10 = await fetch("https://www.demonslayer-api.com/api/v1/characters?limit=3&page=10");
                const page10 = (await resPage10.json()).content;

                const resPage11 = await fetch("https://www.demonslayer-api.com/api/v1/characters?limit=3&page=11");
                const page11 = (await resPage11.json()).content;

                const resPage12 = await fetch("https://www.demonslayer-api.com/api/v1/characters?limit=3&page=12");
                const page12 = (await resPage12.json()).content;

                const resPage14 = await fetch("https://www.demonslayer-api.com/api/v1/characters?limit=3&page=14");
                const page14 = (await resPage14.json()).content;

                const resPage15 = await fetch("https://www.demonslayer-api.com/api/v1/characters?limit=3&page=15");
                const page15 = (await resPage15.json()).content;



                const tanjiro = page1.find(c => c.name.toLowerCase().includes("tanjiro"));
                const giyu = page1.find(c => c.name.toLowerCase().includes("giyu"));

                const sakonji = page2.find(c => c.name.toLowerCase().includes("urokodaki"));
                const sabito = page2.find(c => c.name.toLowerCase().includes("sabito"));
                const makomo = page2.find(c => c.name.toLowerCase().includes("makomo"));

                const genya = page3.find(c => c.name.toLowerCase().includes("genya"));
                const zenitsu = page3.find(c => c.name.toLowerCase().includes("zenitsu"));

                const inosuke = page4.find(c => c.name.toLowerCase().includes("inosuke"));
                const aoi = page4.find(c => c.name.toLowerCase().includes("aoi"));
                const kanao = page4.find(c => c.name.toLowerCase().includes("kanao"));

                const shinobu = page7.find(c => c.name.toLowerCase().includes("shinobu"));
                const murata = page7.find(c => c.name.toLowerCase().includes("murata"));

                const kagaya = page9.find(c => c.name.toLowerCase().includes("kagaya"));

                const tengen = page10.find(c => c.name.toLowerCase().includes("tengen"));
                const mitsuri = page10.find(c => c.name.toLowerCase().includes("mitsuri"));
                const kyojuro = page10.find(c => c.name.toLowerCase().includes("kyojuro"));

                const muichiro = page11.find(c => c.name.toLowerCase().includes("muichiro"));
                const gyomei = page11.find(c => c.name.toLowerCase().includes("gyomei"));
                const obanai = page11.find(c => c.name.toLowerCase().includes("obanai"));

                const sanemi = page12.find(c => c.name.toLowerCase().includes("sanemi"));

                const hotaru = page14.find(c => c.name.toLowerCase().includes("hotaru"));

                const yuriichi = page14.find(c => c.name.toLowerCase().includes("yuriichi"));



                function render(id, character) {
                    const el = document.getElementById(id);
                    if (!el) return; // prevents crash if div missing

                    if (!character) {
                        el.innerHTML = "<p>Character not found</p>";
                        return;
                    }

                    el.innerHTML = `
                <div style="display:flex; gap:20px; align-items:flex-start;">
                    <div>
                        <img src="${character.img}" width="180" style="border-radius:10px;">
                    </div>

                    <div>
                        <h3>${character.name}</h3>
                        <p><strong>Age:</strong> ${character.age || "N/A"}</p>
                        <p><strong>Gender:</strong> ${character.gender || "N/A"}</p>
                        <p><strong>Race:</strong> ${character.race || "N/A"}</p>
                        <p><strong>Description:</strong> ${character.description || "No description"}</p>
                        <p><strong>Quote:</strong> <em>"${character.quote || 'No quote'}"</em></p>

                    </div>
                </div>
            `;
                }

                render("tanjiro", tanjiro);
                render("giyu", giyu);

                render("sakonji", sakonji);
                render("sabito", sabito);
                render("makomo", makomo);

                render("genya", genya);
                render("zenitsu", zenitsu);

                render("inosuke", inosuke);
                render("aoi", aoi);
                render("kanao", kanao);

                render("shinobu", shinobu);
                render("murata", murata);

                render("kagaya", kagaya);

                render("tengen", tengen);
                render("mitsuri", mitsuri);
                render("kyojuro", kyojuro);

                render("muichiro", muichiro);
                render("gyomei", gyomei);
                render("obanai", obanai);

                render("sanemi", sanemi);

                render("hotaru", hotaru);

                render("yuriichi", yuriichi);

            } catch (err) {
                console.error("ERROR:", err);
            }
        }

        loadCharacters();
    </script>
