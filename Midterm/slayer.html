<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <style>
        .bg-maroon {
            background-color: #800000 !important;
        }

        .bg-maroon .nav-link,
        .bg-maroon .navbar-brand {
            color: white !important;
        }

        .bg-white {
            background-color: #ffffff !important;
        }
    </style>

</head>

<body class="bg-dark">

    <nav class="navbar navbar-expand-lg bg-maroon">
        <div class="container-fluid">
            <a class="navbar-brand ms-3" href="#">
                <h2>DEMON SLAYER</h2>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"

                    </form>

                    <!-- Cards -->
                    <div class="row g-3 text-center pt-4">

                        <div class="col-6">
                            <div class="card bg-white rounded">

                            </div>
                        </div>

                        <div class="col-6">

                                    style="width: 60px; height: 60px; object-fit: cover;">
                                <div class="card-body p-2">Breathing Style</div>
                            </div>
                        </div>

                        <div class="col-6 mx-auto">
                            <div class="card bg-white rounded">
                                <img src="..." class="card-img-top mx-auto mt-2"
                                    style="width: 60px; height: 60px; object-fit: cover;">
                                <div class="card-body p-2">Blood Demon Art</div>
                            </div>
                        </div>

                    </div>

                </div>
            </div>



            <div class="col" style="height: 1000;">
                <div class="bg-white p-4 rounded h-100">

                    <h3 class="mb-4">Characters</h3>

                    <div class="row g-4">

                        <div class="accordion accordion-flush" id="accordionFlushExample">
                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                        data-bs-target="#flush-collapseOne" aria-expanded="false"
                                        aria-controls="flush-collapseOne">
                                        Slayer #1
                                    </button>
                                </h2>
                                <div id="flush-collapseOne" class="accordion-collapse collapse"
                                    data-bs-parent="#accordionFlushExample">
                                    <div class="accordion-body"></div>
                                </div>
                            </div>
                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                        data-bs-target="#flush-collapseTwo" aria-expanded="false"
                                        aria-controls="flush-collapseTwo">
                                        Slayer #2
                                    </button>
                                </h2>
                                <div id="flush-collapseTwo" class="accordion-collapse collapse"
                                    data-bs-parent="#accordionFlushExample">
                                    <div class="accordion-body"></div>
                                </div>
                            </div>
                            <div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                        data-bs-target="#flush-collapseThree" aria-expanded="false"
                                        aria-controls="flush-collapseThree">
                                        Slayer #3
                                    </button>
                                </h2>
                                <div id="flush-collapseThree" class="accordion-collapse collapse"
                                    data-bs-parent="#accordionFlushExample">
                                    <div class="accordion-body"></div>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>
            </div>

        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</html>
